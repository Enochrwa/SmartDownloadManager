[workspace]
resolver = "2"
members = [
    "crates/engine",
    "crates/protocols",
    "crates/torrent",
    "crates/media",
    "crates/storage",
    "crates/scheduler",
    "crates/api",
    "apps/desktop/src-tauri",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT"
repository = "https://github.com/Enochrwa/SmartDownloadManager"
authors = ["Enock Rwabukamba"]

[workspace.dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
thiserror = "1"
tracing = "0.1"
tracing-subscriber = "0.3"
reqwest = { version = "0.12", features = ["stream", "rustls-tls"], default-features = false }
sqlx = { version = "0.7", features = ["sqlite", "runtime-tokio-rustls"] }
clap = { version = "4", features = ["derive"] }
axum = "0.7"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
