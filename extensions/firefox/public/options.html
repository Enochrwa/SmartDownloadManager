<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>SmartDownloadManager Settings</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        font: 14px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
        max-width: 560px;
        margin: 32px auto;
        padding: 0 16px;
      }
      h1 {
        font-size: 18px;
      }
      h2 {
        font-size: 14px;
        margin-top: 28px;
        border-bottom: 1px solid rgba(127, 127, 127, 0.25);
        padding-bottom: 4px;
      }
      label {
        display: block;
        margin-top: 12px;
        font-weight: 600;
      }
      .sdm-hint {
        font-weight: normal;
        opacity: 0.7;
        font-size: 12px;
        display: block;
        margin-top: 2px;
      }
      input[type="text"],
      input[type="number"] {
        width: 100%;
        box-sizing: border-box;
        padding: 6px;
        margin-top: 4px;
        font: inherit;
      }
      .sdm-checkbox-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 12px;
      }
      .sdm-checkbox-row label {
        margin: 0;
      }
      button {
        margin-top: 10px;
        padding: 8px 16px;
        cursor: pointer;
      }
      #sdm-pairing-status,
      #sdm-save-confirmation {
        margin-top: 8px;
        font-size: 12px;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <h1>SmartDownloadManager</h1>

    <h2>Pairing</h2>
    <p class="sdm-hint">
      Open the SmartDownloadManager desktop app, go to Settings → Browser
      Extension, and copy the pairing token shown there.
    </p>
    <label for="sdm-api-base-url">
      sdmd address
      <span class="sdm-hint">Usually the default is fine.</span>
    </label>
    <input id="sdm-api-base-url" type="text" value="http://127.0.0.1:7890" />
    <label for="sdm-pairing-token">Pairing token</label>
    <input id="sdm-pairing-token" type="text" placeholder="Paste the token from the desktop app" />
    <button id="sdm-pair-button" type="button">Pair</button>
    <div id="sdm-pairing-status"></div>

    <h2>Download interception</h2>
    <div class="sdm-checkbox-row">
      <input id="sdm-intercept-enabled" type="checkbox" />
      <label for="sdm-intercept-enabled">Hand qualifying downloads to SmartDownloadManager</label>
    </div>
    <label for="sdm-min-size-mb">
      Minimum size (MB)
      <span class="sdm-hint">Downloads at or above this size are intercepted. 0 disables the size check.</span>
    </label>
    <input id="sdm-min-size-mb" type="number" min="0" />
    <label for="sdm-file-type-allowlist">
      Always intercept these file types
      <span class="sdm-hint">Comma-separated extensions, e.g. zip, iso, mp4</span>
    </label>
    <input id="sdm-file-type-allowlist" type="text" />
    <label for="sdm-per-site-opt-in">
      Always intercept downloads from these sites
      <span class="sdm-hint">Comma-separated hostnames, e.g. example.com</span>
    </label>
    <input id="sdm-per-site-opt-in" type="text" />

    <h2>Clipboard monitoring</h2>
    <p class="sdm-hint">Off by default — clipboard access is sensitive.</p>
    <div class="sdm-checkbox-row">
      <input id="sdm-clipboard-enabled" type="checkbox" />
      <label for="sdm-clipboard-enabled">Notify me when a downloadable link is copied</label>
    </div>
    <label for="sdm-clipboard-interval">Check interval (seconds)</label>
    <input id="sdm-clipboard-interval" type="number" min="1" />

    <button id="sdm-save-button" type="button">Save settings</button>
    <div id="sdm-save-confirmation"></div>

    <script type="module" src="options.js"></script>
  </body>
</html>
