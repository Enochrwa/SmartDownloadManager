# cargo-deny config — license compliance enforcement.
# See docs/LICENSING.md and docs/TECH_DECISIONS.md §11.
#
# Run: cargo deny check licenses

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    # File-level copyleft: only affects modifications to the MPL-licensed
    # files themselves, none of which we touch. Pulled in transitively via
    # tauri's HTML parsing stack (dom_query -> selectors/cssparser) and
    # dirs (option-ext).
    "MPL-2.0",
    # Permissive data license used by webpki-roots for its embedded
    # Mozilla root certificate bundle.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

# GPL/LGPL/AGPL crates are NOT in the allow-list above on purpose: FFmpeg and
# yt-dlp are invoked as external subprocesses (never linked), which is the
# only sanctioned way GPL-family tools enter this project. A GPL crate
# showing up as a *linked* Rust dependency should fail CI immediately.

[bans]
multiple-versions = "warn"

[advisories]
yanked = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
